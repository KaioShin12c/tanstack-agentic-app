services:
  postgres:
    image: postgres:17-alpine
    container_name: tanstack-agentic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tanstack_agentic_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tanstack_agentic_app"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
